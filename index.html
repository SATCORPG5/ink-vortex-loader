<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

body{
background:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.enso{
width:350px;
animation: spin 6s linear infinite;
transform-origin:center;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

</style>

</head>

<body>

<img src="1772740794788 (1).svg" class="enso">

</body>
</html>
