<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rotating Wet Ink Enso • Sumi-e Style</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      overflow: hidden;
    }

    .enso-container {
      width:  380px;
      height: 380px;
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Main Enso group – rotates slowly */
    #enso-group {
      transform-origin: 200px 200px;
      animation: rotate-clockwise 12s linear infinite;
    }

    @keyframes rotate-clockwise {
      from { transform: rotate(0deg);    }
      to   { transform: rotate(360deg);  }
    }

    /* Wet glossy ink look */
    .ink-stroke {
      fill: none;
      stroke: url(#wetInk);
      stroke-width: 18;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35))
              url(#blur);
      opacity: 0.98;
    }

    /* Droplets / splatters fling outward */
    .droplet {
      fill: #000;
      opacity: 0;
      animation: fling 12s ease-out infinite;
      transform-origin: 200px 200px;
    }

    /* Each droplet has slightly different timing/offset */
    .d1 { animation-delay: 0s;    }
    .d2 { animation-delay: 1.5s;  }
    .d3 { animation-delay: 3s;    }
    .d4 { animation-delay: 5.2s;  }
    .d5 { animation-delay: 7.8s;  }
    .d6 { animation-delay: 9.3s;  }

    @keyframes fling {
      0%   { opacity: 0;    transform: translate(0,0) scale(0.4); }
      8%   { opacity: 0.9;  transform: translate(0,0) scale(1);   }
      25%  { opacity: 0.7;  transform: translate(var(--dx), var(--dy)) scale(0.9); }
      60%  { opacity: 0.2;  transform: translate(calc(var(--dx)*1.8), calc(var(--dy)*1.8)) scale(0.5); }
      100% { opacity: 0;    transform: translate(calc(var(--dx)*3), calc(var(--dy)*3)) scale(0.1); }
    }

    /* Optional subtle overall breathing */
    .enso-container {
      animation: gentle-breath 18s ease-in-out infinite alternate;
    }

    @keyframes gentle-breath {
      from { transform: scale(1.00); }
      to   { transform: scale(1.04); }
    }
  </style>
</head>
<body>

<div class="enso-container">
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Definitions -->
  <defs>
    <!-- Wet glossy black ink gradient -->
    <linearGradient id="wetInk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#111111"/>
      <stop offset="40%"  stop-color="#000000"/>
      <stop offset="60%"  stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>

    <!-- Slight blur for wet/bleeding feel -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" />
    </filter>
  </defs>

  <!-- Main rotating group -->
  <g id="enso-group">

    <!-- Expressive Enso path (asymmetric, brush-like – feel free to tweak d="") -->
    <path class="ink-stroke"
          d="M 200 60 
             C 120 60,  60 120,  60 200 
             C 60 280,  120 340, 200 340 
             C 260 340, 310 300, 330 240 
             C 345 190, 320 130, 280 90 
             C 260 70,  230 65,  200 60 Z"/>

    <!-- Small flung ink droplets / splatters -->
    <!-- Adjust --dx/--dy values for direction & distance -->
    <circle class="droplet d1" cx="200" cy="200" r="5"   style="--dx: -60px; --dy: -30px;"/>
    <circle class="droplet d2" cx="200" cy="200" r="4.5" style="--dx:  45px; --dy: -55px;"/>
    <circle class="droplet d3" cx="200" cy="200" r="3.8" style="--dx:  70px; --dy:  20px;"/>
    <circle class="droplet d4" cx="200" cy="200" r="6"   style="--dx: -25px; --dy:  65px;"/>
    <ellipse class="droplet d5" cx="200" cy="200" rx="7" ry="3" style="--dx: -55px; --dy:  40px;"/>
    <circle class="droplet d6" cx="200" cy="200" r="4"   style="--dx:  35px; --dy:  50px;"/>

  </g>

</svg>
</div>

</body>
</html>
